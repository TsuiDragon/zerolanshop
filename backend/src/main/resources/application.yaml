server:
  port: 8080

zerolanshop:
  upload:
    image-dir: ${UPLOAD_IMAGE_DIR:./uploads/images}
    public-path: ${UPLOAD_PUBLIC_PATH:/uploads/images/}
  callback:
    base-url: ${CALLBACK_BASE_URL:http://localhost:8080}
    youkayun-order-path: ${YOUKAYUN_ORDER_CALLBACK_PATH:/api/callbacks/youkayun/order}
  supply-monitor:
    initial-delay-ms: ${SUPPLY_MONITOR_INITIAL_DELAY_MS:300000}
    fixed-delay-ms: ${SUPPLY_MONITOR_FIXED_DELAY_MS:300000}
  aliyun:
    sms-auth:
      enabled: ${ALIYUN_SMS_AUTH_ENABLED:true}
      endpoint: ${ALIYUN_SMS_AUTH_ENDPOINT:dypnsapi.aliyuncs.com}
      access-key-id: ${ALIYUN_SMS_AUTH_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_SMS_AUTH_ACCESS_KEY_SECRET:}
      sign-name: ${ALIYUN_SMS_AUTH_SIGN_NAME:速通互联验证码}
      template-code: ${ALIYUN_SMS_AUTH_TEMPLATE_CODE:100001}
      register-template-code: ${ALIYUN_SMS_AUTH_REGISTER_TEMPLATE_CODE:100001}
      login-template-code: ${ALIYUN_SMS_AUTH_LOGIN_TEMPLATE_CODE:100001}
      password-reset-template-code: ${ALIYUN_SMS_AUTH_PASSWORD_RESET_TEMPLATE_CODE:100003}
      bind-phone-template-code: ${ALIYUN_SMS_AUTH_BIND_PHONE_TEMPLATE_CODE:100002}
      country-code: ${ALIYUN_SMS_AUTH_COUNTRY_CODE:86}
      scheme-prefix: ${ALIYUN_SMS_AUTH_SCHEME_PREFIX:ZLS}
      valid-minutes: ${ALIYUN_SMS_AUTH_VALID_MINUTES:5}
      code-length: ${ALIYUN_SMS_AUTH_CODE_LENGTH:6}

jwt:
  secret: ${JWT_SECRET:zerolanshop-jwt-secret-key-2026-min-32-bytes}
  expiration: ${JWT_EXPIRATION:86400000}

spring:
  application:
    name: zerolanshop
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:6000ms}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-wait: ${REDIS_POOL_MAX_WAIT:-1ms}
  datasource:
    url: jdbc:mysql://localhost:3306/zerolanshop?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: cn.zerolan.zerolanshop.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
